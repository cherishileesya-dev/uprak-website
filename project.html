    <style>
        @import url('https://googleapis.com');

        body {
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            /* BACKGROUND SAMA DENGAN HALAMAN PROFIL */
            background-image: linear-gradient(rgba(255, 249, 219, 0.5), rgba(255, 249, 219, 0.5)), 
                              url(https://i.pinimg.com/736x/24/c9/96/24c9964154b882ca81a8d40738efaf79.jpg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header {
            background-color: #ff4d4d; /* Merah Shinchan */
            color: white;
            text-align: center;
            padding: 30px;
            border-bottom: 6px solid #ffde59; /* Kuning Shinchan */
            font-family: 'Fredoka', sans-serif;
        }

        header h1 { margin: 0; font-size: 2.2em; letter-spacing: 2px; }

        nav {
            background-color: #3a86ff; /* Biru Action Mask */
            padding: 12px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover { color: #ffde59; }

        .container {
            width: 90%;
            max-width: 1000px;
            margin: 30px auto;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            border: 4px solid #333;
            box-shadow: 10px 10px 0px #ffde59;
        }

        .container h2 {
            color: #ff4d4d;
            text-align: center;
            font-family: 'Fredoka', sans-serif;
            font-size: 2em;
        }

        .container p {
            text-align: center;
            margin-bottom: 30px;
            font-style: italic;
        }

        /* GRID PROJECT */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .project-card {
            background-color: white;
            border: 3px solid #333;
            border-radius: 15px;
            overflow: hidden;
            text-align: center;
            transition: transform 0.3s;
            box-shadow: 5px 5px 0px #3a86ff; /* Shadow biru */
        }

        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: 8px 8px 0px #ff4d4d; /* Shadow berubah jadi merah saat hover */
        }

        .project-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-bottom: 3px solid #333;
        }

        .project-card a {
            display: block;
            padding: 15px;
            text-decoration: none;
            font-weight: bold;
            color: #333;
            background-color: #ffde59; /* Tombol kuning */
            transition: 0.3s;
        }

        .project-card a:hover {
            background-color: #ff4d4d;
            color: white;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            font-size: 0.9em;
        }
    </style>
